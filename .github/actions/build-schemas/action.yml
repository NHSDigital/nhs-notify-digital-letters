name: "Build Schemas"
description: "build schemas"
inputs:
  version:
    description: "Version number"
    required: true
runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4    - uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Make Config
      working-directory: ./src/cloudeventjekylldocs
      shell: bash
      run: make config

    - name: Make Build
      working-directory: ./src/cloudeventjekylldocs
      shell: bash
      run: make build

    - name: tar schema
      run: tar -cvf artifact.tar src/cloudeventjekylldocs/output/schemas"
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        path: "artifact.tar"
        name: schemas-${{ inputs.version }}
