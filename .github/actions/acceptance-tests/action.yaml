name: Acceptance tests
description: "Run acceptance tests for this repo"

inputs:
  testType:
    description: Type of test to run
    required: true
    default: main

  targetEnvironment:
    description: Name of the environment under test
    required: true
    default: main

  targetAccountGroup:
    description: Name of the account group under test
    default: nhs-notify-digital-letters-dev
    required: true

  targetComponent:
    description: Name of the component under test
    default: dl

  shard:
    description: "Playwright shard index in the format N/total e.g. 1/4 (optional, omit to run all tests)"
    required: false
    default: ""

runs:
  using: "composite"

  steps:
    - name: Get Node version
      id: nodejs_version
      shell: bash
      run: |
        echo "nodejs_version=$(grep "^nodejs\s" .tool-versions | cut -f2 -d' ')" >> $GITHUB_OUTPUT
    - uses: ./.github/actions/node-install
      with:
        node-version: ${{ steps.nodejs_version.outputs.nodejs_version }}
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
    - name: Cache node modules
      id: cache-node-modules
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          node_modules
          tests/playwright/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json', 'tests/playwright/package-lock.json') }}
        restore-keys: |
          node-modules-${{ runner.os }}-
    - name: "Install dependencies"
      if: steps.cache-node-modules.outputs.cache-hit != 'true'
      shell: bash
      run: |
        npm ci
    - name: "Generate dependencies"
      shell: bash
      run: |
        npm run generate-dependencies
    - name: Run test - ${{ inputs.testType }}
      shell: bash
      run: |
        set -euo pipefail
        case "$TEST_TYPE" in
          main|integration|unit)
            make "test-$TEST_TYPE"
            ;;
          *)
            echo "Invalid testType: $TEST_TYPE" >&2
            exit 1
            ;;
        esac
      env:
        TEST_TYPE: ${{ inputs.testType }}
        ENVIRONMENT: ${{ inputs.targetEnvironment }}
        PLAYWRIGHT_SHARD: ${{ inputs.shard }}
    - name: Archive integration test results
      if: ${{ inputs.testType == 'integration' }}
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      with:
        name: Integration test report
        path: "tests/playwright/playwright-report"
